<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body style="background:#f0f0f0; margin:0; padding:0;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td style="background:#f0f0f0; padding:20px;">
            <b>Login Page</b><br><br>
            <p th:if="${error}" th:text="${error}" style="color:red;"></p>
            <form method="post" th:action="@{/login}">
                Username:<br>
                <input type="text" name="username" style="width:100%; padding:6px; margin-bottom:12px; border:1px solid #ccc;"/><br>
                Password:<br>
                <input type="password" name="password" style="width:100%; padding:6px; margin-bottom:12px; border:1px solid #ccc;"/><br>
                <button type="submit" style="background:#1a73e8; color:white; padding:6px 16px; border:none; cursor:pointer;">Login</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
