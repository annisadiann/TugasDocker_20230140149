version: '3.8'

services:
  db:
    image: postgres:14
    container_name: db_mahasiswa
    restart: always
    environment:
      POSTGRES_DB: praktikum_db
      POSTGRES_USER: praktikum_user
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
      image: username/app-mhs
      container_name: app_mahasiswa
      ports:
        - "8080"
      depends_on:
        - db
      environment:
        DB_URL: jdbc:postgresql://db:5432/praktikum_db
        DB_USERNAME: praktikum_user
        DB_PASSWORD: 12345